<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Leech UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .neon-border {
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5), inset 0 0 10px rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-panel p-8 rounded-2xl w-full max-w-lg space-y-6">
        <h1 class="text-3xl font-bold text-center bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
            TG Leecher
        </h1>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Direct Download URL</label>
                <input type="text" id="urlInput" placeholder="https://example.com/file.zip" 
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500 transition-colors">
            </div>

            <button id="leechBtn" onclick="startLeech()" 
                    class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]">
                Leech to Telegram
            </button>
        </div>

        <div id="statusArea" class="hidden space-y-2 pt-4 border-t border-gray-700 mt-4">
            <div class="flex justify-between text-sm">
                <span id="statusText" class="text-gray-300">Idle</span>
                <span id="percentageText" class="text-cyan-400 font-mono">0%</span>
            </div>
            
            <div class="w-full bg-gray-800 rounded-full h-2.5">
                <div id="progressBar" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        
        function connect() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                const statusArea = document.getElementById('statusArea');
                const statusText = document.getElementById('statusText');
                const percentageText = document.getElementById('percentageText');
                const progressBar = document.getElementById('progressBar');
                const leechBtn = document.getElementById('leechBtn');
                
                statusArea.classList.remove('hidden');
                
                if (data.status === 'error') {
                    statusText.innerText = "Error: " + data.message;
                    statusText.className = "text-red-400";
                    leechBtn.disabled = false;
                    leechBtn.innerText = "Leech to Telegram";
                    return;
                }

                if (data.status === 'completed') {
                    statusText.innerText = data.message;
                    statusText.className = "text-green-400";
                    percentageText.innerText = "100%";
                    progressBar.style.width = "100%";
                    leechBtn.disabled = false;
                    leechBtn.innerText = "Leech again";
                    return;
                }
                
                statusText.className = "text-gray-300";
                statusText.innerText = data.status.charAt(0).toUpperCase() + data.status.slice(1) + "...";
                
                if (data.percentage !== undefined) {
                    percentageText.innerText = data.percentage + "%";
                    progressBar.style.width = data.percentage + "%";
                }
            };
            
            ws.onclose = function() {
                console.log("WebSocket connection closed. Reconnecting...");
                setTimeout(connect, 1000);
            };
        }

        function startLeech() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            const leechBtn = document.getElementById('leechBtn');
            
            if (!url) return alert("Please enter a URL");
            
            if (ws.readyState === WebSocket.OPEN) {
                leechBtn.disabled = true;
                leechBtn.innerText = "Processing...";
                ws.send(JSON.stringify({url: url}));
            } else {
                alert("Connection failed. Please refresh the page.");
            }
        }

        connect();
    </script>
</body>
</html>
